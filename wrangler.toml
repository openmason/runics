# Runics Search - Cloudflare Workers Configuration
name = "runics-search"
main = "src/index.ts"
compatibility_date = "2025-02-01"

[observability]
enabled = true

# KV for caching search results
[[kv_namespaces]]
binding = "SEARCH_CACHE"
# Replace with actual KV namespace ID: wrangler kv:namespace create SEARCH_CACHE
id = "2e63a7085ae54de895da31048e50cf8b"

# Hyperdrive for Postgres connection pooling
[[hyperdrive]]
binding = "HYPERDRIVE"
# Replace with actual Hyperdrive ID after creating it
id = "501e216abba04c13993a75ae2e97c110"
# For local development: Add your direct Neon connection string below
# Uncomment and replace with your actual connection string from Neon dashboard
localConnectionString = "postgresql://neondb_owner:npg_4P6BeXkZLcTA@ep-autumn-river-akx7s38p-pooler.c-3.us-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require"

# Workers AI binding for embeddings, LLM, reranking, content safety
[ai]
binding = "AI"

# Environment variables (configurable per environment)
[vars]
ENVIRONMENT = "development"

# Model configuration
EMBEDDING_MODEL = "@cf/baai/bge-small-en-v1.5"
RERANKER_MODEL = "@cf/baai/bge-reranker-base"
LLM_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
SAFETY_MODEL = "@cf/meta/llama-guard-3-8b"

# Content safety (set to "true" to disable for dev/testing)
DISABLE_CONTENT_SAFETY = "true"

# Confidence tier thresholds (derived from Phase 2 score analysis, 40 skills)
# Correct match scores: P10=0.42, P25=0.46, P50=0.49, P75=0.52
# Target: Tier 1 ~60-70%, Tier 2 ~20-25%, Tier 3 ~5-10%
CONFIDENCE_TIER1_THRESHOLD = "0.47"  # High confidence (P30 of correct scores)
CONFIDENCE_TIER2_THRESHOLD = "0.42"  # Medium confidence (P10 of correct scores)

# Cache configuration (Tier 1: 120s, Tier 2/3: 60s - KV minimum)
CACHE_TTL_SECONDS = "120"

# Default search parameters
DEFAULT_APPETITE = "balanced"

# Score fusion weights (vector + full-text)
VECTOR_WEIGHT = "0.7"
FULLTEXT_WEIGHT = "0.3"

# Phase 2: Confidence gate tuning
SCORE_GAP_THRESHOLD = "0.02"          # Min gap for high confidence
CLUSTER_DENSITY_THRESHOLD = "0.05"    # Relative threshold for cluster density
DEEP_SEARCH_ENABLED = "true"          # Enable LLM deep search for Tier 2/3
LLM_MAX_TOKENS = "500"               # Max tokens per LLM call

# Production environment overrides
[env.production]
[env.production.vars]
ENVIRONMENT = "production"
CACHE_TTL_SECONDS = "120"

# Staging environment
[env.staging]
[env.staging.vars]
ENVIRONMENT = "staging"
CACHE_TTL_SECONDS = "120"
