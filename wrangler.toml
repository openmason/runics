# ══════════════════════════════════════════════════════════════════════════════
# Runics Search — Staging (phantoms account)
# ══════════════════════════════════════════════════════════════════════════════
#
# Deploy:  wrangler deploy
# URL:     runics.phantoms.workers.dev
#
# Production config is in wrangler.production.toml (cognium account).
#
# ══════════════════════════════════════════════════════════════════════════════

name = "runics"
main = "src/index.ts"
compatibility_date = "2025-02-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
account_id = "1f59f4dcd0ebb559e3c392566978d446"  # OpenMason account (hosts phantoms.workers.dev)

[observability]
enabled = true

# KV for caching search results
[[kv_namespaces]]
binding = "SEARCH_CACHE"
# Replace with actual KV namespace ID: wrangler kv:namespace create SEARCH_CACHE
id = "2e63a7085ae54de895da31048e50cf8b"

# KV for Cognium job state (submit → poll handoff)
[[kv_namespaces]]
binding = "COGNIUM_JOBS"
# Replace with actual KV namespace ID: wrangler kv:namespace create COGNIUM_JOBS
id = "bfcb4b45618945d69d55ef3809887367"

# Hyperdrive for Postgres connection pooling
[[hyperdrive]]
binding = "HYPERDRIVE"
# Replace with actual Hyperdrive ID after creating it
id = "501e216abba04c13993a75ae2e97c110"
# For local development: Add your direct Neon connection string below
# Uncomment and replace with your actual connection string from Neon dashboard
localConnectionString = "postgresql://neondb_owner:npg_4P6BeXkZLcTA@ep-autumn-river-akx7s38p-pooler.c-3.us-west-2.aws.neon.tech/neondb?sslmode=require&channel_binding=require"

# Workers AI binding for embeddings, LLM, reranking, content safety
[ai]
binding = "AI"

[vars]
ENVIRONMENT = "staging"
NEON_CONNECTION_STRING = "postgresql://neondb_owner:npg_4P6BeXkZLcTA@ep-autumn-river-akx7s38p.c-3.us-west-2.aws.neon.tech/neondb?sslmode=require"

# Model configuration
EMBEDDING_MODEL = "@cf/baai/bge-small-en-v1.5"
RERANKER_MODEL = "@cf/baai/bge-reranker-base"
LLM_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
SAFETY_MODEL = "@cf/meta/llama-guard-3-8b"

# Content safety (set to "true" to disable for dev/testing)
DISABLE_CONTENT_SAFETY = "true"

# Confidence tier thresholds (derived from Phase 2 score analysis, 40 skills)
# Correct match scores: P10=0.42, P25=0.46, P50=0.49, P75=0.52
# Target: Tier 1 ~60-70%, Tier 2 ~20-25%, Tier 3 ~5-10%
CONFIDENCE_TIER1_THRESHOLD = "0.47"  # High confidence (P30 of correct scores)
CONFIDENCE_TIER2_THRESHOLD = "0.42"  # Medium confidence (P10 of correct scores)

# Cache configuration (Tier 1: 120s, Tier 2/3: 60s - KV minimum)
CACHE_TTL_SECONDS = "120"

# Default search parameters
DEFAULT_APPETITE = "balanced"

# Score fusion weights (vector + full-text)
VECTOR_WEIGHT = "0.7"
FULLTEXT_WEIGHT = "0.3"

# Phase 2: Confidence gate tuning
SCORE_GAP_THRESHOLD = "0.02"          # Min gap for high confidence
CLUSTER_DENSITY_THRESHOLD = "0.05"    # Relative threshold for cluster density
DEEP_SEARCH_ENABLED = "true"          # Enable LLM deep search for Tier 2/3
LLM_MAX_TOKENS = "500"               # Max tokens per LLM call

# Phase 3: Multi-vector indexing
MULTI_VECTOR_ENABLED = "true"         # +5.7% R@1 combined with reranker, eliminates Tier 3

# Phase 4: Production polish
CIRCUIT_BREAKER_THRESHOLD = "3"       # Consecutive LLM failures before circuit opens
CIRCUIT_BREAKER_COOLDOWN_MS = "30000" # Cooldown before half-open retry (30s)
RATE_LIMIT_RPM = "100"                # Max search requests per minute per IP
RERANKER_ENABLED = "true"             # Cross-encoder reranking (+4.6% R@1 lift, eval-measured)
RERANKER_TOP_N = "20"                 # Number of candidates to rerank

# Cognium (Circle-IR integration)
COGNIUM_ENABLED = "false"             # Hard kill switch — set to "true" to resume cron + queue scanning
COGNIUM_URL = "https://circle.cognium.net"
COGNIUM_POLL_DELAY_MS = "15000"
COGNIUM_MAX_POLL_ATTEMPTS = "12"
ANALYSIS_ENABLED = "false"              # Kill switch for analysis queue processing
# COGNIUM_API_KEY set via: wrangler secret put COGNIUM_API_KEY
# ACTIVEPIECES_WEBHOOK_URL set via: wrangler secret put ACTIVEPIECES_WEBHOOK_URL

# Version ranking weights
VERSION_TRUST_WEIGHT = "0.7"
VERSION_USAGE_WEIGHT = "0.3"

# Trust-score ranking boost (multiplicative on fusedScore)
TRUST_BOOST_WEIGHT = "0.3"
# Candidate pool multiplier — fetch N× candidates before trust-boost pagination
CANDIDATE_POOL_MULTIPLIER = "3"
# Name-match boost — boost results whose name matches query tokens
NAME_BOOST_WEIGHT = "0.15"

# Phase 5: Sync pipeline config
# Staging is for ad-hoc testing only — disable automated sync to avoid churn.
# Production enables these in wrangler.production.toml.
SYNC_MCP_ENABLED = "false"
SYNC_CLAWHUB_ENABLED = "false"
SYNC_GITHUB_ENABLED = "false"
SYNC_GLAMA_ENABLED = "false"
SYNC_SMITHERY_ENABLED = "false"
SYNC_PULSEMCP_ENABLED = "false"
SYNC_OPENCLAW_ENABLED = "false"

# R2 bucket for skill code bundles
[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "runics-skills"

# Queue producers (async embedding + Cognium scanning)
[[queues.producers]]
binding = "EMBED_QUEUE"
queue = "runics-embed"

[[queues.producers]]
binding = "COGNIUM_QUEUE"
queue = "runics-cognium-v2"

[[queues.producers]]
binding = "COGNIUM_POLL_QUEUE"
queue = "runics-cognium-poll-v2"

[[queues.producers]]
binding = "SKILL_EVENTS"
queue = "runics-skill-events"

[[queues.producers]]
binding = "ANALYSIS_QUEUE"
queue = "runics-analysis-submit"

[[queues.producers]]
binding = "ANALYSIS_POLL_QUEUE"
queue = "runics-analysis-poll"

# Queue consumers
[[queues.consumers]]
queue = "runics-embed"
max_batch_size = 20
max_batch_timeout = 30

[[queues.consumers]]
queue = "runics-cognium-v2"
max_batch_size = 5
max_batch_timeout = 60
max_retries = 2
dead_letter_queue = "cognium-dlq"

[[queues.consumers]]
queue = "runics-cognium-poll-v2"
max_batch_size = 5
max_batch_timeout = 60
max_retries = 0
dead_letter_queue = "cognium-poll-dlq"

[[queues.consumers]]
queue = "runics-analysis-submit"
max_batch_size = 2
max_batch_timeout = 60
max_retries = 2
dead_letter_queue = "analysis-dlq"

[[queues.consumers]]
queue = "runics-analysis-poll"
max_batch_size = 5
max_batch_timeout = 60
max_retries = 0
dead_letter_queue = "analysis-poll-dlq"

# Cron triggers: every minute for scan poll drain, includes hourly mat view refresh
[triggers]
crons = ["* * * * *"]

